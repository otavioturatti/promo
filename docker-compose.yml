services:
  ml-afiliados:
    build: .
    restart: always
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
